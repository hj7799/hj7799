<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoVista GIS 工具</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1a1d23;color:#e8eaed;height:100vh;display:flex;flex-direction:column}
.header{background:#22262e;padding:10px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #333}
.logo{font-weight:700;color:#00d4aa;font-size:16px}
.btn{background:#333842;color:#9aa0a6;border:1px solid #444;padding:8px 14px;border-radius:6px;cursor:pointer;font-size:13px;transition:all .2s}
.btn:hover{background:#444;color:#fff}
.btn-primary{background:#00d4aa;color:#1a1d23;border-color:#00d4aa;font-weight:600}
.btn-primary:hover{background:#00e8bb}
.btn:disabled{opacity:0.5;cursor:not-allowed}
.main{flex:1;display:flex;overflow:hidden}
.sidebar{width:220px;background:#22262e;border-right:1px solid #333;padding:12px;overflow-y:auto}
.section{margin-bottom:16px}
.section-title{font-size:10px;font-weight:700;color:#5f6368;text-transform:uppercase;margin-bottom:8px}
.section .btn{width:100%;margin-bottom:4px;text-align:left;font-size:12px;padding:7px 10px}
#map{flex:1}
.panel{width:260px;background:#22262e;border-left:1px solid #333;padding:12px;overflow-y:auto}
.panel-title{font-weight:600;margin-bottom:10px;font-size:14px}
.layer-item{display:flex;align-items:center;gap:6px;padding:6px;background:#2a2e37;border-radius:4px;margin-bottom:4px}
.layer-color{width:10px;height:10px;border-radius:2px}
.layer-name{flex:1;font-size:11px}
.layer-count{font-size:10px;color:#666}
.layer-btn{background:0;border:0;color:#888;cursor:pointer;padding:2px 4px}
.layer-btn:hover{color:#fff}
.statusbar{background:#2a2e37;border-top:1px solid #333;padding:6px 16px;display:flex;gap:16px;font-size:11px;color:#9aa0a6}
.status-dot{width:5px;height:5px;border-radius:50%;background:#00d4aa}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:9999}
.modal.show{display:flex}
.modal-box{background:#22262e;border-radius:10px;padding:20px;min-width:380px;max-width:500px}
.modal-title{font-size:15px;font-weight:600;margin-bottom:14px}
.modal-row{margin-bottom:10px}
.modal-label{font-size:11px;color:#9aa0a6;margin-bottom:4px;display:block}
.modal-input,.modal-select{width:100%;padding:8px 10px;background:#2a2e37;border:1px solid #444;border-radius:5px;color:#fff;font-size:13px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:14px}
.toast{position:fixed;top:15px;right:15px;background:#22262e;border-left:4px solid #00d4aa;padding:10px 16px;border-radius:6px;font-size:13px;z-index:99999;animation:slideIn .3s}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
.coords{font-family:monospace;font-size:11px;color:#666;margin-left:auto}
.hint{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);background:#22262e;border:1px solid #444;padding:8px 16px;border-radius:6px;font-size:12px;z-index:1000;display:none}
.hint.show{display:block}
.empty{text-align:center;padding:20px;color:#5f6368;font-size:12px}
</style>
</head>
<body>
<div class="header">
  <div class="logo">🗺️ GeoVista</div>
  <button class="btn" onclick="document.getElementById('fileInput').click()">📁 导入</button>
  <button class="btn" onclick="openExportModal()">💾 导出</button>
  <div style="flex:1"></div>
  <button class="btn" id="btnOSM" onclick="switchBase('osm')">🗺️</button>
  <button class="btn" id="btnSat" onclick="switchBase('sat')">🛰️</button>
  <div class="coords" id="coords">-- , --</div>
</div>
<div class="main">
  <div class="sidebar">
    <div class="section">
      <div class="section-title">绘制</div>
      <button class="btn" onclick="startDraw('marker')">📍 绘制点</button>
      <button class="btn" onclick="startDraw('polyline')">✏️ 绘制线</button>
      <button class="btn" onclick="startDraw('polygon')">⬡ 绘制面</button>
      <button class="btn btn-primary" onclick="disableDraw()">🚫 停止绘制</button>
    </div>
    <div class="section">
      <div class="section-title">测量</div>
      <button class="btn" onclick="startMeasure('dist')">📏 距离</button>
      <button class="btn" onclick="startMeasure('area')">📐 面积</button>
    </div>
    <div class="section">
      <div class="section-title">分析</div>
      <button class="btn" onclick="openModal('buffer')">⭕ 缓冲区</button>
      <button class="btn" onclick="openModal('overlay')">🔀 叠加</button>
      <button class="btn" onclick="startRoute()">🛤️ 路径</button>
    </div>
    <div class="section">
      <div class="section-title">操作</div>
      <button class="btn" onclick="clearAllLayers()">🗑️ 清除全部</button>
    </div>
  </div>
  <div id="map"></div>
  <div class="panel">
    <div class="panel-title">图层 (<span id="layerCount">0</span>)</div>
    <div id="layerEmpty" class="empty">暂无图层</div>
    <div id="layerList"></div>
  </div>
</div>
<div class="statusbar">
  <span class="status-dot"></span> <span id="statusText">就绪</span>
  <span>缩放: <span id="zoomLevel">4</span></span>
</div>
<div class="hint" id="hint"></div>
<input type="file" id="fileInput" accept=".geojson,.json,.kml,.zip,.csv" style="display:none">

<!-- 缓冲区模态框 -->
<div class="modal" id="modalBuffer">
  <div class="modal-box">
    <div class="modal-title">缓冲区分析</div>
    <div class="modal-row"><label class="modal-label">选择图层</label><select class="modal-select" id="bufferLayer"></select></div>
    <div class="modal-row"><label class="modal-label">距离(公里)</label><input type="number" class="modal-input" id="bufferDist" value="10"></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal('buffer')">取消</button><button class="btn btn-primary" onclick="runBuffer()">执行</button></div>
  </div>
</div>

<!-- 叠加分析模态框 -->
<div class="modal" id="modalOverlay">
  <div class="modal-box">
    <div class="modal-title">叠加分析</div>
    <div class="modal-row"><label class="modal-label">图层A</label><select class="modal-select" id="overlayA"></select></div>
    <div class="modal-row"><label class="modal-label">图层B</label><select class="modal-select" id="overlayB"></select></div>
    <div class="modal-row"><label class="modal-label">类型</label><select class="modal-select" id="overlayType"><option value="intersect">交集</option><option value="union">并集</option><option value="difference">差集</option></select></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal('overlay')">取消</button><button class="btn btn-primary" onclick="runOverlay()">执行</button></div>
  </div>
</div>

<!-- 导出模态框 -->
<div class="modal" id="modalExport">
  <div class="modal-box">
    <div class="modal-title">导出数据</div>
    <div class="modal-row"><label class="modal-label">选择图层</label><select class="modal-select" id="exportLayer"></select></div>
    <div class="modal-row"><label class="modal-label">格式</label><select class="modal-select" id="exportFormat"><option value="geojson">GeoJSON</option><option value="kml">KML</option><option value="csv">CSV</option></select></div>
    <div class="modal-actions"><button class="btn" onclick="closeModal('export')">取消</button><button class="btn btn-primary" onclick="runExport()">下载</button></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-draw@1.0.4/dist/leaflet.draw.js"></script>
<script src="https://unpkg.com/@turf/turf@6/turf.min.js"></script>
<script src="https://unpkg.com/togeojson@0.16.0/togeojson.js"></script>
<script src="https://unpkg.com/shpjs@4.0.4/dist/shp.js"></script>
<script>
// 全局变量
let map, drawnItems;
let layers = [];
let currentTool = null;
let currentDrawHandler = null;
let measurePts = [], measureLine = null, measureMarkers = [];
let routePts = [];
let baseLayers = {};

// 初始化
function init() {
  map = L.map('map', { center: [35.86, 104.19], zoom: 4 });
  baseLayers.osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 18 });
  baseLayers.sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 18 });
  baseLayers.osm.addTo(map);
  
  drawnItems = new L.FeatureGroup();
  map.addLayer(drawnItems);
  
  map.on('mousemove', e => document.getElementById('coords').textContent = e.latlng.lng.toFixed(4) + ' , ' + e.latlng.lat.toFixed(4));
  map.on('zoomend', () => document.getElementById('zoomLevel').textContent = map.getZoom());
  map.on('click', onMapClick);
  map.on('dblclick', onMapDblClick);
  map.on(L.Draw.Event.CREATED, onDrawCreated);
  
  showToast('GIS 工具已就绪');
}

// 底图切换
function switchBase(name) {
  Object.values(baseLayers).forEach(l => map.removeLayer(l));
  baseLayers[name].addTo(map);
}

// Toast
function showToast(msg) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function setStatus(text) { document.getElementById('statusText').textContent = text; }
function showHint(text) { const h = document.getElementById('hint'); h.textContent = text; h.classList.add('show'); }
function hideHint() { document.getElementById('hint').classList.remove('show'); }

// 图层管理
function genId() { return 'l_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5); }

function addLayer(name, geojson, color, leafletLayer) {
  const id = genId();
  layers.push({ id, name, geojson, color, leafletLayer });
  renderLayers();
  return layers[layers.length - 1];
}

function removeLayer(id) {
  const idx = layers.findIndex(l => l.id === id);
  if (idx >= 0) {
    if (layers[idx].leafletLayer) map.removeLayer(layers[idx].leafletLayer);
    layers.splice(idx, 1);
    renderLayers();
  }
}

function renderLayers() {
  const list = document.getElementById('layerList');
  const empty = document.getElementById('layerEmpty');
  document.getElementById('layerCount').textContent = layers.length;
  
  if (layers.length === 0) { empty.style.display = 'block'; list.innerHTML = ''; return; }
  
  empty.style.display = 'none';
  list.innerHTML = layers.map(l => 
    '<div class="layer-item"><div class="layer-color" style="background:' + l.color + '"></div>' +
    '<div class="layer-name">' + l.name + '</div><div class="layer-count">' + l.geojson.features.length + '</div>' +
    '<button class="layer-btn" onclick="removeLayer(\'' + l.id + '\')">🗑</button></div>'
  ).join('');
}

// 绘制功能
function startDraw(type) {
  disableDraw();
  currentTool = 'draw';
  
  let handler;
  if (type === 'marker') {
    handler = new L.Draw.Marker(map, {});
  } else if (type === 'polyline') {
    handler = new L.Draw.Polyline(map, { shapeOptions: { color: '#00d4aa', weight: 3 } });
  } else {
    handler = new L.Draw.Polygon(map, { shapeOptions: { color: '#00d4aa', fillOpacity: 0.3 } });
  }
  
  handler.enable();
  currentDrawHandler = handler;
  
  showHint('点击绘制，双击结束');
  setStatus('绘制中');
}

function disableDraw() {
  if (currentDrawHandler) {
    currentDrawHandler.disable();
    currentDrawHandler = null;
  }
  currentTool = null;
  document.getElementById('hint').classList.remove('show');
  setStatus('就绪');
  showToast('已停止绘制');
}

function onDrawCreated(e) {
  const layer = e.layer;
  const type = e.layerType;
  
  let geojson;
  const color = type === 'marker' ? '#ff8c42' : (type === 'polyline' ? '#4da6ff' : '#00d4aa');
  const name = type === 'marker' ? '点' : (type === 'polyline' ? '线' : '面');
  
  if (type === 'marker') {
    const ll = layer.getLatLng();
    geojson = { type: 'FeatureCollection', features: [{ type: 'Feature', geometry: { type: 'Point', coordinates: [ll.lng, ll.lat] }, properties: {} }] };
  } else {
    geojson = layer.toGeoJSON();
    if (!geojson.type) geojson = { type: 'FeatureCollection', features: [geojson] };
  }
  
  const leafletLayer = L.geoJSON(geojson, { 
    pointToLayer: (f, latlng) => L.marker(latlng),
    style: { color, fillOpacity: 0.3 } 
  }).addTo(map);
  addLayer(name + '_' + Date.now(), geojson, color, leafletLayer);
  showToast('已保存: ' + name);
  disableDraw();
}

// 测量功能
function startMeasure(type) {
  disableDraw();
  currentTool = type === 'dist' ? 'measureDist' : 'measureArea';
  measurePts = [];
  measureMarkers.forEach(m => map.removeLayer(m));
  measureMarkers = [];
  if (measureLine) { map.removeLayer(measureLine); measureLine = null; }
  showHint('点击添加点，双击结束');
  setStatus(type === 'dist' ? '测距' : '测面');
}

function onMapClick(e) {
  if (!currentTool) return;
  
  if (currentTool === 'measureDist' || currentTool === 'measureArea') {
    measurePts.push([e.latlng.lat, e.latlng.lng]);
    const m = L.marker(e.latlng).addTo(map);
    measureMarkers.push(m);
    if (measurePts.length > 1) {
      if (measureLine) map.removeLayer(measureLine);
      measureLine = L.polyline(measurePts, { color: '#ff8c42', weight: 3, dashArray: '5,5' }).addTo(map);
    }
  }
  
  if (currentTool === 'route') {
    routePts.push([e.latlng.lng, e.latlng.lat]);
    L.marker(e.latlng).addTo(map);
    if (routePts.length === 2) calcRoute();
  }
}

function onMapDblClick(e) {
  if (currentTool === 'measureDist' && measurePts.length > 1) {
    const line = turf.lineString(measurePts.map(p => [p[1], p[0]]));
    showToast('距离: ' + turf.length(line, { units: 'kilometers' }).toFixed(2) + ' 公里');
    resetMeasure();
  }
  if (currentTool === 'measureArea' && measurePts.length > 2) {
    const coords = measurePts.map(p => [p[1], p[0]]);
    coords.push([coords[0][0], coords[0][1]]);
    showToast('面积: ' + (turf.area(turf.polygon([coords])) / 1000000).toFixed(4) + ' km²');
    resetMeasure();
  }
}

function resetMeasure() {
  measurePts = [];
  measureMarkers.forEach(m => map.removeLayer(m));
  measureMarkers = [];
  if (measureLine) { map.removeLayer(measureLine); measureLine = null; }
  disableDraw();
}

// 路径规划
function startRoute() {
  disableDraw();
  currentTool = 'route';
  routePts = [];
  showHint('点击选择起点和终点');
  setStatus('路径规划');
}

function calcRoute() {
  const url = 'https://router.project-osrm.org/route/v1/driving/' + routePts[0][0] + ',' + routePts[0][1] + ';' + routePts[1][0] + ',' + routePts[1][1] + '?overview=full&geometries=geojson';
  fetch(url).then(r => r.json()).then(d => {
    if (d.routes && d.routes[0]) {
      const coords = d.routes[0].geometry.coordinates.map(c => [c[1], c[0]]);
      L.polyline(coords, { color: '#00d4aa', weight: 4 }).addTo(map);
      showToast('距离: ' + (d.routes[0].distance/1000).toFixed(2) + ' km');
    } else { showToast('无法计算路线'); }
  }).catch(() => showToast('路线计算失败'));
  routePts = [];
  disableDraw();
}

// 模态框
function openModal(name) {
  document.getElementById('modal' + name).classList.add('show');
  const opts = layers.map(l => '<option value="' + l.id + '">' + l.name + '</option>').join('');
  if (name === 'buffer') document.getElementById('bufferLayer').innerHTML = opts || '<option value="">无图层</option>';
  if (name === 'overlay') { document.getElementById('overlayA').innerHTML = opts || '<option value="">无图层</option>'; document.getElementById('overlayB').innerHTML = opts || '<option value="">无图层</option>'; }
  if (name === 'export') document.getElementById('exportLayer').innerHTML = opts || '<option value="">无图层</option>';
}

function closeModal(name) {
  document.getElementById('modal' + name).classList.remove('show');
}

// 缓冲区
function runBuffer() {
  const l = layers.find(x => x.id === document.getElementById('bufferLayer').value);
  if (!l) return showToast('请选择图层');
  const dist = parseFloat(document.getElementById('bufferDist').value);
  
  const buf = { type: 'FeatureCollection', features: l.geojson.features.map(f => {
    try { return turf.buffer(f, dist, { units: 'kilometers' }); } catch(e) { return null; }
  }).filter(f => f) };
  
  if (!buf.features.length) return showToast('无法生成缓冲区');
  
  const color = '#ff8c42';
  const ll = L.geoJSON(buf, { style: { color, fillOpacity: 0.3 } }).addTo(map);
  addLayer('缓冲区', buf, color, ll);
  closeModal('buffer');
  showToast('缓冲区已生成');
}

// 叠加分析
function runOverlay() {
  const la = layers.find(x => x.id === document.getElementById('overlayA').value);
  const lb = layers.find(x => x.id === document.getElementById('overlayB').value);
  const type = document.getElementById('overlayType').value;
  if (!la || !lb) return showToast('请选择图层');
  
  const res = { type: 'FeatureCollection', features: [] };
  la.geojson.features.forEach(fa => {
    lb.geojson.features.forEach(fb => {
      try {
        const op = type === 'intersect' ? turf.intersect(fa, fb) : type === 'union' ? turf.union(fa, fb) : turf.difference(fa, fb);
        if (op) res.features.push(op);
      } catch(e) {}
    });
  });
  
  if (!res.features.length) return showToast('无结果');
  
  const color = '#4da6ff';
  const ll = L.geoJSON(res, { style: { color, fillOpacity: 0.4 } }).addTo(map);
  addLayer('叠加结果', res, color, ll);
  closeModal('overlay');
  showToast('叠加完成');
}

// 文件导入
document.getElementById('fileInput').onchange = function(e) {
  const f = e.target.files[0];
  if (!f) return;
  const ext = f.name.split('.').pop().toLowerCase();
  const reader = new FileReader();
  
  if (ext === 'zip') {
    // Shapefile ZIP 导入
    reader.onload = function(ev) {
      shp(ev.target.result).then(function(geojson) {
        const ll = L.geoJSON(geojson, { style: { color: '#00d4aa', fillOpacity: 0.3 } }).addTo(map);
        map.fitBounds(ll.getBounds());
        addLayer(f.name.replace('.zip', ''), geojson, '#00d4aa', ll);
        showToast('已导入 Shapefile');
      }).catch(function(err) {
        console.error(err);
        showToast('Shapefile 解析失败: ' + err.message);
      });
    };
    reader.readAsArrayBuffer(f);
  }
  else if (ext === 'csv') {
    // CSV 导入
    reader.onload = function(ev) {
      try {
        const text = ev.target.result;
        const lines = text.trim().split('\n');
        const header = lines[0].split(',').map(h => h.trim().toLowerCase());
        
        const latIdx = header.findIndex(h => h === 'lat' || h === 'latitude' || h === '纬度');
        const lonIdx = header.findIndex(h => h === 'lon' || h === 'lng' || h === 'longitude' || h === '经度');
        const nameIdx = header.findIndex(h => h === 'name' || h === '名称');
        
        if (latIdx === -1 || lonIdx === -1) {
          showToast('CSV 需要包含经纬度列 (lat, lon)');
          return;
        }
        
        const features = [];
        for (let i = 1; i < lines.length; i++) {
          const cols = lines[i].split(',');
          if (cols.length > Math.max(latIdx, lonIdx)) {
            const lat = parseFloat(cols[latIdx]);
            const lon = parseFloat(cols[lonIdx]);
            if (!isNaN(lat) && !isNaN(lon)) {
              features.push({
                type: 'Feature',
                geometry: { type: 'Point', coordinates: [lon, lat] },
                properties: { name: nameIdx >= 0 ? cols[nameIdx] : 'P' + i }
              });
            }
          }
        }
        
        if (features.length === 0) {
          showToast('CSV 中没有有效的坐标点');
          return;
        }
        
        const geojson = { type: 'FeatureCollection', features };
        const ll = L.geoJSON(geojson, { 
          pointToLayer: (f, latlng) => L.marker(latlng),
          style: { color: '#00d4aa', fillOpacity: 0.3 } 
        }).addTo(map);
        map.fitBounds(ll.getBounds());
        addLayer(f.name.replace('.csv', ''), geojson, '#00d4aa', ll);
        showToast('已导入 CSV: ' + features.length + ' 个点');
      } catch (err) {
        showToast('CSV 解析失败');
      }
    };
    reader.readAsText(f);
  }
  else if (ext === 'json' || ext === 'geojson') {
    reader.onload = function(ev) {
      try {
        let gj = JSON.parse(ev.target.result);
        if (!gj.type) { showToast('无效的GeoJSON'); return; }
        const ll = L.geoJSON(gj, { style: { color: '#00d4aa', fillOpacity: 0.3 } }).addTo(map);
        map.fitBounds(ll.getBounds());
        addLayer(f.name, gj, '#00d4aa', ll);
        showToast('已导入 GeoJSON');
      } catch(err) { showToast('解析失败'); }
    };
    reader.readAsText(f);
  }
  else if (ext === 'kml') {
    reader.onload = function(ev) {
      try {
        const p = new DOMParser();
        const kml = p.parseFromString(ev.target.result, 'text/xml');
        const gj = toGeoJSON.kml(kml);
        const ll = L.geoJSON(gj, { style: { color: '#00d4aa', fillOpacity: 0.3 } }).addTo(map);
        map.fitBounds(ll.getBounds());
        addLayer(f.name, gj, '#00d4aa', ll);
        showToast('已导入 KML');
      } catch(err) { showToast('KML 解析失败'); }
    };
    reader.readAsText(f);
  }
  else {
    showToast('不支持格式: ' + ext);
  }
  this.value = '';
};

// 导出
function openExportModal() {
  if (layers.length === 0) return showToast('无图层可导出');
  openModal('export');
}

function runExport() {
  const l = layers.find(x => x.id === document.getElementById('exportLayer').value);
  const fmt = document.getElementById('exportFormat').value;
  if (!l) return showToast('请选择图层');
  
  let data, fn;
  if (fmt === 'geojson') {
    data = JSON.stringify(l.geojson, null, 2);
    fn = l.name + '.geojson';
  }
  else if (fmt === 'kml') {
    // 简单 KML 导出
    let kml = '<?xml version="1.0" encoding="UTF-8"?><kml xmlns="http://www.opengis.net/kml/2.2"><Document>';
    l.geojson.features.forEach((f, i) => {
      const geom = f.geometry;
      if (geom.type === 'Point') {
        kml += '<Placemark><name>' + (f.properties.name || 'P'+i) + '</name><Point><coordinates>' + geom.coordinates[0] + ',' + geom.coordinates[1] + '</coordinates></Point></Placemark>';
      } else if (geom.type === 'LineString') {
        kml += '<Placemark><name>' + (f.properties.name || 'L'+i) + '</name><LineString><coordinates>' + geom.coordinates.map(c => c[0]+','+c[1]).join(' ') + '</coordinates></LineString></Placemark>';
      } else if (geom.type === 'Polygon') {
        kml += '<Placemark><name>' + (f.properties.name || 'Poly'+i) + '</name><Polygon><outerBoundaryIs><LinearRing><coordinates>' + geom.coordinates[0].map(c => c[0]+','+c[1]).join(' ') + '</coordinates></LinearRing></outerBoundaryIs></Polygon></Placemark>';
      }
    });
    kml += '</Document></kml>';
    data = kml;
    fn = l.name + '.kml';
  }
  else {
    const pts = l.geojson.features.filter(f => f.geometry.type === 'Point');
    if (!pts.length) return showToast('无点要素，无法导出 CSV');
    data = 'lat,lon,name\n' + pts.map(f => f.geometry.coordinates[1] + ',' + f.geometry.coordinates[0] + ',' + (f.properties.name || '')).join('\n');
    fn = l.name + '.csv';
  }
  
  const b = new Blob([data], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b);
  a.download = fn;
  a.click();
  closeModal('export');
  showToast('已导出');
}

function clearAllLayers() {
  layers.forEach(l => { if (l.leafletLayer) map.removeLayer(l.leafletLayer); });
  layers = [];
  drawnItems.clearLayers();
  renderLayers();
  showToast('已清除');
}

window.onload = init;
</script>
